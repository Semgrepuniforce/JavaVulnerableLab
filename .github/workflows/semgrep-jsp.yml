name: Semgrep JSP Scan

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Tomcat and Ant
        run: |
          wget -q https://archive.apache.org/dist/tomcat/tomcat-9/v9.0.98/bin/apache-tomcat-9.0.98.tar.gz
          tar xzf apache-tomcat-9.0.98.tar.gz
          wget -q https://archive.apache.org/dist/ant/binaries/apache-ant-1.10.15-bin.tar.gz
          tar xzf apache-ant-1.10.15-bin.tar.gz

      - name: Convert JSP to Java
        run: |
          mkdir -p converted
          java -cp "apache-tomcat-9.0.98/lib/*:apache-ant-1.10.15/lib/ant.jar" \
            org.apache.jasper.JspC \
            -uriroot ./src/main/webapp \
            -d ./converted || true
          echo "=== 轉譯結果 ==="
          find converted -name "*.java"
          echo "=== 轉譯檔案數量 ==="
          find converted -name "*.java" | wc -l

      - name: Install Semgrep
        run: pip install semgrep

      - name: Semgrep CI
        run: semgrep ci
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
