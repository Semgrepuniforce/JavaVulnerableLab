name: Semgrep JSP Scan

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Tomcat, Ant, JSTL
        run: |
          wget -q https://archive.apache.org/dist/tomcat/tomcat-9/v9.0.98/bin/apache-tomcat-9.0.98.tar.gz
          tar xzf apache-tomcat-9.0.98.tar.gz
          wget -q https://archive.apache.org/dist/ant/binaries/apache-ant-1.10.15-bin.tar.gz
          tar xzf apache-ant-1.10.15-bin.tar.gz
          wget -q https://repo1.maven.org/maven2/javax/servlet/jstl/1.2/jstl-1.2.jar

      - name: Convert JSP to Java
        run: |
          mkdir -p converted
          java -cp "apache-tomcat-9.0.98/lib/*:apache-tomcat-9.0.98/bin/tomcat-juli.jar:apache-ant-1.10.15/lib/ant.jar:jstl-1.2.jar" \
            org.apache.jasper.JspC \
            -uriroot ./src/main/webapp \
            -d ./converted
          echo "=== 轉譯檔案數量 ==="
          find converted -name "*.java" | wc -l

      - name: Add JSP line mapping
        run: python3 jsp_line_mapper.py ./src/main/webapp ./converted

      - name: Commit converted files to master
        run: |
          rm -rf apache-tomcat-* apache-ant-* jstl-*.jar *.tar.gz
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add converted/
          git commit -m "Update JSP converted files [skip ci]" || echo "No changes"
          git push origin master
          echo "NEW_SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Install Semgrep
        run: pip install semgrep

      - name: Semgrep CI
        run: semgrep ci
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
          GITHUB_SHA: ${{ env.NEW_SHA }}
